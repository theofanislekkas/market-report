<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Daily Market Audio Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f2f2ee; padding: 30px; color: #111; min-height: 100vh; }
.card { background: #fff; border-radius: 14px; border: 1px solid #ddd; max-width: 720px; margin: 0 auto; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
.hdr { background: #f8f8f4; border-bottom: 1px solid #e8e8e0; padding: 14px 22px; display: flex; justify-content: space-between; align-items: center; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #3d9e75; display: inline-block; margin-right: 7px; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.hdr-title { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #666; font-family: monospace; }
.hdr-date { font-size: 11px; color: #999; font-family: monospace; }
.body { padding: 22px; }
.fetch-btn { display: block; width: 100%; padding: 13px; background: #f8f8f4; border: 1px solid #ccc; border-radius: 9px; font-family: monospace; font-size: 13px; font-weight: 600; color: #222; cursor: pointer; text-align: center; margin-bottom: 14px; letter-spacing: .02em; }
.fetch-btn:hover { background: #efefea; }
.fetch-btn:disabled { opacity: .45; cursor: not-allowed; }
.script { background: #f8f8f4; border: 1px solid #e8e8e0; border-radius: 9px; padding: 18px; font-size: 13px; line-height: 1.9; color: #222; max-height: 420px; overflow-y: auto; margin-bottom: 14px; white-space: pre-wrap; font-family: monospace; display: none; }
.player { background: #f8f8f4; border: 1px solid #e8e8e0; border-radius: 9px; padding: 14px 16px; display: none; }
.controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.btn { padding: 8px 16px; background: #fff; border: 1px solid #ccc; border-radius: 8px; font-family: monospace; font-size: 12px; color: #222; cursor: pointer; white-space: nowrap; }
.btn:hover { background: #f0f0ea; }
.prog-wrap { flex: 1; min-width: 80px; height: 4px; background: #ddd; border-radius: 2px; }
.prog-bar { height: 100%; background: #555; width: 0%; border-radius: 2px; transition: width .3s; }
select { font-family: monospace; font-size: 11px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #222; cursor: pointer; }
.status { font-family: monospace; font-size: 11px; color: #888; min-height: 16px; }
.counter { font-family: monospace; font-size: 11px; color: #bbb; min-width: 44px; }
.note { font-size: 11px; font-family: monospace; color: #aaa; margin-top: 12px; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <span class="hdr-title"><span class="dot"></span>Daily Market Audio Report</span>
    <span class="hdr-date" id="dateLabel"></span>
  </div>
  <div class="body">
    <button class="fetch-btn" id="fetchBtn" onclick="buildReport()">Fetch live data &amp; generate report</button>
    <div class="script" id="scriptBox"></div>
    <div class="player" id="playerBox">
      <div class="controls">
        <button class="btn" id="playBtn" onclick="togglePlay()">&#9654; Play</button>
        <button class="btn" onclick="stopAudio()">&#9632; Stop</button>
        <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
        <span class="counter" id="counter"></span>
        <select id="voiceSel"></select>
        <select id="speedSel">
          <option value=".8">0.8x</option>
          <option value=".9">0.9x</option>
          <option value="1" selected>1x</option>
          <option value="1.1">1.1x</option>
          <option value="1.25">1.25x</option>
          <option value="1.5">1.5x</option>
        </select>
      </div>
      <div class="status" id="statusLine">Ready — press Play.</div>
    </div>
    <p class="note">Save this file to your computer and open it in Chrome or Edge each morning. Click "Fetch live data" to pull current prices from Yahoo Finance, then press Play.</p>
    <p class="note">VXNR and MOVE Index are not available on free data feeds and will be flagged in the report.</p>
  </div>
</div>

<script>
const TICKERS = {
  'S&P 500':            '^GSPC',
  'Nasdaq':             '^IXIC',
  'Russell 2000':       '^RUT',
  'VIX':                '^VIX',
  'RVX':                '^RVX',
  'EUR/USD':            'EURUSD=X',
  'GBP/USD':            'GBPUSD=X',
  'USD/JPY':            'JPY=X',
  'USD/CAD':            'CAD=X',
  'Gold':               'GC=F',
  'Silver':             'SI=F',
  'Copper':             'HG=F',
  'WTI Crude':          'CL=F',
  'Brent Crude':        'BZ=F',
  'Natural Gas':        'NG=F',
  'Wheat':              'ZW=F',
  'Soybeans':           'ZS=F',
  'FTSE 100':           '^FTSE',
  'DAX':                '^GDAXI',
  'CAC 40':             '^FCHI',
  'Nikkei 225':         '^N225',
  'Hang Seng':          '^HSI',
  'Shanghai Composite': '000001.SS',
  'Sensex':             '^BSESN',
  'KOSPI':              '^KS11',
  'BIST 100':           'XU100.IS',
  'IDX Composite':      '^JKSE',
  'TSX':                '^GSPTSE',
  'IPC Mexico':         '^MXX',
  'Bovespa':            '^BVSP'
};

const now = new Date();
document.getElementById('dateLabel').textContent = now.toLocaleDateString('en-US', {
  weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
});

let chunks = [], voices = [], currentChunk = 0, isPlaying = false, isPaused = false, pausedAt = 0;
const voiceSel = document.getElementById('voiceSel');

function loadVoices() {
  voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  voiceSel.innerHTML = '';
  voices.forEach((v, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = v.name.length > 28 ? v.name.slice(0, 28) + '...' : v.name;
    if (/samantha|daniel|google us english|karen/i.test(v.name)) o.selected = true;
    voiceSel.appendChild(o);
  });
  if (!voiceSel.options.length) voiceSel.innerHTML = '<option>Default</option>';
}
loadVoices();
if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

function fmt(val, digits) {
  if (val == null || isNaN(val)) return 'N/A';
  return Number(val).toLocaleString('en-US', { minimumFractionDigits: digits, maximumFractionDigits: digits });
}

function makeLine(label, data, digits) {
  if (!data || data.regularMarketPrice == null) return label + '. Data unavailable.';
  const price = fmt(data.regularMarketPrice, digits);
  const prev  = fmt(data.regularMarketPreviousClose, digits);
  const chg   = data.regularMarketChange;
  const pchg  = data.regularMarketChangePercent;
  const dir   = chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat';
  const sign  = chg >= 0 ? 'positive' : 'negative';
  const abs   = fmt(Math.abs(chg), digits);
  const absp  = fmt(Math.abs(pchg), 2);
  return label + '. ' + price + '. Previous close ' + prev + '. ' + dir + ' ' + abs + ', ' + sign + ' ' + absp + ' percent.';
}

async function buildReport() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = 'Fetching live data...';
  setStatus('Contacting Yahoo Finance...');

  try {
    const syms = Object.values(TICKERS).join(',');
    const url = 'https://query1.finance.yahoo.com/v7/finance/quote?symbols=' + encodeURIComponent(syms);
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const raw = {};
    (json?.quoteResponse?.result || []).forEach(q => { raw[q.symbol] = q; });

    function q(label) { return raw[TICKERS[label]]; }
    function line(label, digits) { return makeLine(label, q(label), digits); }

    const dateStr = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    const sc = [];

    sc.push(dateStr + '. Global Market Report.');
    sc.push('U.S. EQUITIES.');
    sc.push(line('S&P 500', 2));
    sc.push(line('Nasdaq', 2));
    sc.push(line('Russell 2000', 2));
    sc.push('VOLATILITY.');
    sc.push(line('VIX', 2));
    sc.push('VXNR. Not available on free data feeds.');
    sc.push(line('RVX', 2));
    sc.push('MOVE Index. Not available on free data feeds. Requires Bloomberg or ICE terminal.');
    sc.push('FOREX.');
    sc.push(line('EUR/USD', 4));
    sc.push(line('GBP/USD', 4));
    sc.push(line('USD/JPY', 2));
    sc.push(line('USD/CAD', 4));
    sc.push('COMMODITIES.');
    sc.push(line('Gold', 2));
    sc.push(line('Silver', 3));
    sc.push(line('Copper', 3));
    sc.push(line('WTI Crude', 2));
    sc.push(line('Brent Crude', 2));
    sc.push(line('Natural Gas', 3));
    sc.push(line('Wheat', 2));
    sc.push(line('Soybeans', 2));
    sc.push('EUROPE.');
    sc.push(line('FTSE 100', 2));
    sc.push(line('DAX', 2));
    sc.push(line('CAC 40', 2));
    sc.push('ASIA-PACIFIC AND EMERGING MARKETS.');
    sc.push(line('Nikkei 225', 2));
    sc.push(line('Hang Seng', 2));
    sc.push(line('Shanghai Composite', 2));
    sc.push(line('Sensex', 2));
    sc.push(line('KOSPI', 2));
    sc.push(line('BIST 100', 2));
    sc.push(line('IDX Composite', 2));
    sc.push('AMERICAS.');
    sc.push(line('TSX', 2));
    sc.push(line('IPC Mexico', 2));
    sc.push(line('Bovespa', 2));
    sc.push('End of report. ' + dateStr + '.');

    chunks = sc;
    document.getElementById('scriptBox').textContent = sc.join('\n');
    document.getElementById('scriptBox').style.display = 'block';
    document.getElementById('playerBox').style.display = 'block';
    btn.textContent = 'Refresh live data';
    btn.disabled = false;
    setStatus('Ready — press Play.');

  } catch(e) {
    btn.textContent = 'Retry';
    btn.disabled = false;
    setStatus('Fetch error: ' + e.message);
  }
}

function setStatus(m) { document.getElementById('statusLine').textContent = m; }
function setProgress(p) { document.getElementById('progBar').style.width = Math.min(100, p) + '%'; }
function setCounter(a, b) { document.getElementById('counter').textContent = (a && b) ? a + '/' + b : ''; }
function getVoice() { const i = parseInt(voiceSel.value); return (!isNaN(i) && voices[i]) ? voices[i] : null; }
function getRate() { return parseFloat(document.getElementById('speedSel').value); }

function speakChunk(i) {
  if (i >= chunks.length) {
    isPlaying = false;
    document.getElementById('playBtn').textContent = 'Play';
    setProgress(100); setStatus('Complete.'); setCounter(chunks.length, chunks.length);
    setTimeout(() => setProgress(0), 2000);
    return;
  }
  currentChunk = i;
  setCounter(i + 1, chunks.length);
  setProgress(Math.round((i / chunks.length) * 100));
  const u = new SpeechSynthesisUtterance(chunks[i]);
  u.rate = getRate(); u.volume = 1;
  const v = getVoice(); if (v) u.voice = v;
  u.onend = () => { if (isPlaying) speakChunk(i + 1); };
  u.onerror = (e) => { if (e.error === 'interrupted' || e.error === 'canceled') return; setStatus('Speech error: ' + e.error); };
  speechSynthesis.speak(u);
}

function togglePlay() {
  if (!chunks.length) { setStatus('Fetch the report first.'); return; }
  const btn = document.getElementById('playBtn');
  if (isPaused) {
    isPaused = false; isPlaying = true; btn.textContent = 'Pause'; setStatus('Playing...'); speakChunk(pausedAt); return;
  }
  if (isPlaying) {
    isPaused = true; isPlaying = false; pausedAt = currentChunk; speechSynthesis.cancel(); btn.textContent = 'Resume'; setStatus('Paused.'); return;
  }
  speechSynthesis.cancel(); currentChunk = 0; isPlaying = true; isPaused = false;
  btn.textContent = 'Pause'; setStatus('Playing...'); speakChunk(0);
}

function stopAudio() {
  speechSynthesis.cancel(); isPlaying = false; isPaused = false; currentChunk = 0; pausedAt = 0;
  document.getElementById('playBtn').textContent = 'Play';
  setProgress(0); setCounter('', ''); setStatus('Stopped.');
}
</script>
</body>
</html>
